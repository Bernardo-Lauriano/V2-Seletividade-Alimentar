<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🍽️ O que eu quero comer?</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="frame">
  <div class="btn-back-container">
    <button class="btn-back" onclick="voltarHome()">← Voltar</button>
  </div>
  <div class="header-bg">
    <div class="title-banner"> O que eu quero comer? </div>
    <div class="alimentos-label">Toque no alimento para colocar no prato!</div>
    
    <!-- Botões de Categorias -->
    <div class="categorias-container">
      <button class="categoria-btn ativo" onclick="filtrarCategoria(this, 'proteinas')">🥚 Proteínas</button>
      <button class="categoria-btn" onclick="filtrarCategoria(this, 'carboidratos')">🍚 Carboidratos</button>
      <button class="categoria-btn" onclick="filtrarCategoria(this, 'verduras')">🥬 Verduras</button>
      <button class="categoria-btn" onclick="filtrarCategoria(this, 'legumes')">🥕 Legumes</button>
      <button class="categoria-btn" onclick="filtrarCategoria(this, 'frutas')">🍎 Frutas</button>
    </div>
    
    <div class="food-grid" id="foodGrid"></div>
  </div>

  <div class="prato-area">
    <span class="estrela" style="top:5%;left:2%;animation-delay:0s"><img src="Images/image-removebg-preview.png"></span>
    <span class="estrela" style="top:5%;right:2%;animation-delay:0.6s"><img src="Images/image-removebg-preview.png"></span>
    <span class="estrela" style="bottom:5%;left:2%;animation-delay:1.1s"><img src="Images/image-removebg-preview.png"></span>
    <span class="estrela" style="bottom:5%;right:2%;animation-delay:0.4s"><img src="Images/image-removebg-preview.png"></span>

    <div class="prato-container">
      <div class="prato-interna" id="pratoInterna">
        <div class="prato-vazio-txt" id="pratoVazio">🍽️<br>Escolha<br>um alimento!</div>
      </div>
    </div>

    <div class="bottom-row">
      <span class="animal"></span>
      <button class="btn-limpar" onclick="limparPrato()">🗑️ Limpar prato</button>
      <span class="animal"></span>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
